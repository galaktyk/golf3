<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Club Controller</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="controller-body">
  <main class="controller-shell">
    <section class="panel controls-panel">
      <div class="control-row control-row-top">
        <button id="connect-button" class="action-button primary">Connect</button>
        <button id="calibrate-button" class="action-button secondary" disabled>Set Forward</button>
      </div>
      <div class="control-row control-row-triple">
        <button id="club-prev-button" class="action-button secondary" disabled>&lt;</button>
        <span class="control-label">Club</span>
        <button id="club-next-button" class="action-button secondary" disabled>&gt;</button>
      </div>
      <div class="control-row control-row-triple">
        <button id="rotate-left-button" class="action-button secondary hold-button" disabled>&lt;</button>
        <span class="control-label">Aim</span>
        <button id="rotate-right-button" class="action-button secondary hold-button" disabled>&gt;</button>
      </div>
    </section>
    <section class="panel status-panel">
      <p id="controller-status">Idle</p>
      <p id="controller-debug" class="debug-copy">No orientation yet.</p>
    </section>
  </main>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="/static/js/golf_club.js"></script>
</body>
</html>
