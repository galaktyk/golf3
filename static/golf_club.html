<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Club Controller</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="controller-body">
  <main class="controller-shell">
    <section class="controller-safe-zone" aria-hidden="true"></section>
    <section class="controller-playfield">
      <section id="aim-joystick" class="aim-joystick" aria-label="Aim joystick">
        <div class="aim-joystick-visual" aria-hidden="true">
          <div class="aim-joystick-base"></div>
          <div class="aim-joystick-knob"></div>
        </div>
      </section>
      <section class="controller-dock">
        <section class="panel controls-panel">
          <p id="controller-status" class="status-pill">Offline</p>
          <div class="control-row club-row">
            <button id="club-prev-button" class="action-button secondary club-button" disabled aria-label="Previous club">&lt;</button>
            <button id="club-next-button" class="action-button secondary club-button" disabled aria-label="Next club">&gt;</button>
          </div>
          <div class="control-row control-row-top dock-actions-row">
            <button id="connect-button" class="action-button primary">Connect</button>
            <button id="calibrate-button" class="action-button secondary" disabled>Forward</button>
          </div>
        </section>
        <p id="controller-debug" class="orientation-copy">Orientation and gyro waiting</p>
      </section>
    </section>
  </main>
  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three/build/three.module.js"
      }
    }
  </script>
  <script type="module" src="/static/js/golf_club.js"></script>
</body>
</html>
